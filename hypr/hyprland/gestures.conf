gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.15
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

# Gestures with 3 fingers ($gestureFingers)
gesture = $gestureFingers, up, dispatcher, exec, qs ipc -c overview call overview open
gesture = $gestureFingers, down, dispatcher, exec, qs ipc -c overview call overview close
# gesture = $gestureFingers, down, dispatcher, exec, caelestia toggle specialws && qs ipc -c overview call overview close
gesture = $gestureFingers, pinch, float
gesture = $gestureFingers, swipe, move
gesture = $gestureFingers, up, mod: Alt+Shift, dispatcher, movetoworkspace, special:special 
gesture = $gestureFingers, down, mod: Alt+Shift, dispatcher, movetoworkspace, e+0

# Gestures with 4 fingers ($gestureFingersMore)
gesture = $gestureFingersMore, horizontal, workspace

#gesture = $gestureFingers, up, special, special
#gesture = $gestureFingersMore, down, dispatcher, exec, systemctl suspend-then-hibernate

