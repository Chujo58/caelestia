$hypr = ~/.config/hypr
$hl = $hypr/hyprland
$cConf = ~/.config/caelestia

# Variables (colours + other vars)
exec = cp -L --no-preserve=mode --update=none $hypr/scheme/default/conf $hypr/scheme/current.conf
source = $hypr/scheme/current.conf
source = $hypr/variables.conf

exec = mkdir -p $cConf && touch -a $cConf/hypr-vars.conf
source = $cConf/hypr-vars.conf

monitor = eDP-1, preferred, auto, 1.5
monitor = DP-3, preferred, auto-up, 1
#monitor = DP-3, preferred, auto, 1

exec-once = bash -c 'echo "export DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" > ~/.dbus_session_address'

source = $hl/env.conf
source = $hl/general.conf
source = $hl/input.conf
source = $hl/misc.conf
source = $hl/animations.conf
source = $hl/decoration.conf
source = $hl/group.conf
source = $hl/execs.conf
source = $hl/rules.conf
source = $hl/gestures.conf
source = $hl/keybinds.conf
source = $hl/plugins.conf

exec = mkdir -p $cConf && touch -a $cConf/hypr-user.conf
source = $cConf/hypr-user.conf

#bind = Super+Shift, S, exec, hyprshot -m region --clipboard-only
exec-once = systemctl --user start watch-theme
# exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = hyprpm reload

# bindl=,switch:Lid Switch:off, exec, loginctl lock-session && hyprctl dispatch dpms off

# bindl=,switch:Lid Switch:on,exec,hyprctl dispatch dpms on


# bindl=,switch:Lid Switch:"turn off",exec,loginctl lock-session 
# bindl=,switch:"Lid Switch":turn on,exec,hyprctl dispatch dpms on
bindl=,switch:Lid Switch, exec, /home/chujo/.config/hypr/scripts/lid-dpms.sh
